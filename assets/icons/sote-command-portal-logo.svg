<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" role="img" aria-labelledby="title desc">
  <title id="title">SOTE Command Portal Logo</title>
  <desc id="desc">Shield emblem with paw, circuit nodes, and rocket mark next to SOTE Command Portal text.</desc>
  <defs>
    <linearGradient id="shield" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#cf1235"/>
      <stop offset="1" stop-color="#7d0d22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1">
      <stop offset="0" stop-color="#27d7ff"/>
      <stop offset="1" stop-color="#ffb703"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="180" rx="28" fill="#07182d"/>
  <g transform="translate(26 20)">
    <path d="M72 0l64 21v45c0 43-24 79-64 94C32 145 8 109 8 66V21L72 0z" fill="url(#shield)" stroke="#f3f7fb" stroke-width="5"/>
    <path d="M43 92c0-16 13-28 29-28s29 12 29 28c0 18-13 31-29 31S43 110 43 92z" fill="#f8fafc" opacity=".96"/>
    <circle cx="43" cy="61" r="12" fill="#f8fafc"/>
    <circle cx="65" cy="43" r="13" fill="#f8fafc"/>
    <circle cx="91" cy="43" r="13" fill="#f8fafc"/>
    <circle cx="111" cy="62" r="12" fill="#f8fafc"/>
    <path d="M72 30v-14m0 14l-22 17m22-17l25 17m-25 92v18" stroke="#26d6ff" stroke-width="5" stroke-linecap="round" opacity=".85"/>
    <circle cx="72" cy="16" r="5" fill="#26d6ff" filter="url(#softGlow)"/>
    <path d="M108 119c18-7 29-19 34-36-15 5-27 16-34 36z" fill="#ffb703" stroke="#fff" stroke-width="2"/>
    <path d="M122 103l18-3-12 13z" fill="#fff" opacity=".9"/>
  </g>
  <g transform="translate(185 44)">
    <text x="0" y="42" font-family="Arial Black, Impact, sans-serif" font-size="42" fill="#f8fafc" letter-spacing="1.5">SOTE Command Portal</text>
    <text x="1" y="76" font-family="Inter, Arial, sans-serif" font-size="20" fill="#a9c6e8">CCAC Student-Operated Technology Ecosystem</text>
    <g transform="translate(0 98)">
      <rect x="0" y="0" width="470" height="32" rx="16" fill="#0d2748" stroke="#284d75"/>
      <text x="18" y="22" font-family="Inter, Arial, sans-serif" font-size="16" fill="#f8fafc" letter-spacing="2">Access. Learn. Build. Defend. Lead.</text>
    </g>
  </g>
  <path d="M735 38h112c16 0 28 12 28 28v48c0 16-12 28-28 28H735c-16 0-28-12-28-28V66c0-16 12-28 28-28z" fill="#0d2748" stroke="url(#glow)" stroke-width="3"/>
  <text x="735" y="83" font-family="Arial Black, Impact, sans-serif" font-size="20" fill="#f8fafc">MISSION</text>
  <text x="735" y="111" font-family="Arial Black, Impact, sans-serif" font-size="24" fill="#ffb703">ONLINE</text>
</svg>
